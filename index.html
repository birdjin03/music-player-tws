<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Player</title>

<style>
body {
  margin: 0;
  background: transparent;
  display: flex;
  justify-content: center;
  align-items: center;
}

.player {
  width: 160px;
  padding: 10px;
  border-radius: 18px;
  background: rgba(255,255,255,0.95);
  font-family: sans-serif;
}

/* 커버 */
.cover-box {
  width: 100%;
  aspect-ratio: 1/1;
  border: 2px solid #a9d2ff;
  border-radius: 16px;
  overflow: hidden;
}

.cover {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 텍스트 */
.title {
  font-size: 11px;
  font-weight: 700;
  margin-top: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.artist {
  font-size: 9px;
  color: #666;
}

/* 프로그레스 */
input[type="range"] {
  width: 100%;
  height: 3px;
  margin-top: 6px;
}

input[type="range"]::-webkit-slider-thumb {
  width: 8px;
  height: 8px;
  background: #2f6fff;
}

/* 버튼 */
.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
}

button {
  border: none;
  background: none;
  font-size: 14px;
  color: #a9d2ff;
  cursor: pointer;
}

button:hover {
  color: #2f6fff;
}

.play {
  font-size: 18px;
}
</style>
</head>

<body>

<div class="player">

  <div class="cover-box">
    <img id="cover" class="cover" src="summerbeat.jpg">
  </div>

  <div id="title" class="title">hey! hey!</div>
  <div id="artist" class="artist">TWS</div>

  <audio id="audio"></audio>

  <input id="progress" type="range" min="0" max="100" value="0">

  <div class="controls">
    <button id="prev">⏮</button>
    <button id="play" class="play">▶</button>
    <button id="next">⏭</button>
  </div>

</div>

<script>
const songs = [
  {
    title: "hey! hey!",
    artist: "TWS",
    file: "hey-hey.mp3",
    cover: "summerbeat.jpg"
  },
  {
    title: "Fire Confetti",
    artist: "TWS",
    file: "fire-confetti.mp3",
    cover: "summerbeat.jpg"
  },
  {
    title: "Lucky to be loved",
    artist: "TWS",
    file: "lucky-to-be-loved.mp3",
    cover: "trywithus.webp"
  }
];

let current = 0;

const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const progress = document.getElementById("progress");

const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

function loadSong(i){
  audio.src = songs[i].file;
  cover.src = songs[i].cover;
  title.textContent = songs[i].title;
  artist.textContent = songs[i].artist;
}

function playPause(){
  if(audio.paused){
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
}

playBtn.onclick = playPause;

nextBtn.onclick = () => {
  current = (current + 1) % songs.length;
  loadSong(current);
  audio.play();
};

prevBtn.onclick = () => {
  current = (current - 1 + songs.length) % songs.length;
  loadSong(current);
  audio.play();
};

audio.ontimeupdate = () => {
  if(audio.duration){
    progress.value = (audio.currentTime / audio.duration) * 100;
  }
};

progress.oninput = () => {
  if(audio.duration){
    audio.currentTime = (progress.value / 100) * audio.duration;
  }
};

loadSong(current);
</script>

</body>
</html>
