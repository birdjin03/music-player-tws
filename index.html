<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blue Border Music Player</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8fbff;
      font-family: "Arial", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: #111;
    }

    .player {
      width: 200px;
      padding: 20px 18px 26px;
      background: #ffffff;
    }

    .cover-box {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 2px solid #a9d2ff;
      border-radius: 20px;
      overflow: hidden;
      background: #eef7ff;
      margin-bottom: 16px;
    }

    .cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 18px;
    }

    .text-group {
      min-width: 0;
    }

    .title {
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 4px;
      color: #111;
      word-break: keep-all;
    }

    .artist {
      font-size: 9px;
      color: #555;
      font-weight: 500;
    }

    .like-btn {
      border: none;
      background: transparent;
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      color: #a9d2ff;
      transition: transform 0.15s ease, color 0.15s ease;
    }

    .like-btn:hover {
      transform: scale(1.08);
    }

    .like-btn.active {
      color: #2f6fff;
    }

    .wave-area {
      width: 100%;
      height: 36px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wave-svg {
      width: 92%;
      height: 100%;
      display: block;
    }

    .wave-svg rect {
      fill: #a9d2ff;
      transition: fill 0.15s ease;
    }

    .progress-wrap {
      margin-bottom: 6px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: #a9d2ff;
      border-radius: 999px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      margin-top: -5px;
      border-radius: 50%;
      background: #2f6fff;
      border: none;
    }

    input[type="range"]::-moz-range-track {
      height: 4px;
      background: #a9d2ff;
      border-radius: 999px;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2f6fff;
      border: none;
    }

    .time-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      font-size: 13px;
      font-weight: 700;
      color: #4f6580;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto 1fr 1fr;
      align-items: center;
      gap: 10px;
    }

    .icon-btn,
    .main-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      color: #a9d2ff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .icon-btn:hover,
    .main-btn:hover {
      transform: scale(1.05);
      color: #2f6fff;
    }

    .icon-btn svg,
    .main-btn svg {
      display: block;
    }

    .icon-btn {
      width: 30px;
      height: 30px;
      justify-self: center;
    }

    .main-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #a9d2ff;
      color: #ffffff;
      justify-self: center;
    }

    .main-btn:hover {
      background: #2f6fff;
      color: #fff;
    }

    .playlist {
      margin-top: 18px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="player">
    <div class="cover-box">
      <img id="cover" class="cover" src="summerbeat.jpg" alt="album cover" />
    </div>

    <div class="info-row">
      <div class="text-group">
        <div id="title" class="title">hey! hey!</div>
        <div id="artist" class="artist">TWS</div>
      </div>

      <button id="likeBtn" class="like-btn" aria-label="like">♥</button>
    </div>

    <div class="wave-area">
      <svg class="wave-svg" viewBox="0 0 320 70" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="26" width="6" height="18" rx="3"/>
        <rect x="16" y="20" width="6" height="30" rx="3"/>
        <rect x="28" y="28" width="6" height="14" rx="3"/>
        <rect x="40" y="18" width="6" height="34" rx="3"/>
        <rect x="52" y="10" width="6" height="50" rx="3"/>
        <rect x="64" y="24" width="6" height="22" rx="3"/>
        <rect x="76" y="15" width="6" height="40" rx="3"/>
        <rect x="88" y="5" width="6" height="60" rx="3"/>
        <rect x="100" y="22" width="6" height="26" rx="3"/>
        <rect x="112" y="13" width="6" height="44" rx="3"/>
        <rect x="124" y="0" width="6" height="70" rx="3"/>
        <rect x="136" y="18" width="6" height="34" rx="3"/>
        <rect x="148" y="26" width="6" height="18" rx="3"/>
        <rect x="160" y="12" width="6" height="46" rx="3"/>
        <rect x="172" y="20" width="6" height="30" rx="3"/>
        <rect x="184" y="28" width="6" height="14" rx="3"/>
        <rect x="196" y="16" width="6" height="38" rx="3"/>
        <rect x="208" y="10" width="6" height="50" rx="3"/>
        <rect x="220" y="24" width="6" height="22" rx="3"/>
        <rect x="232" y="15" width="6" height="40" rx="3"/>
        <rect x="244" y="22" width="6" height="26" rx="3"/>
        <rect x="256" y="18" width="6" height="34" rx="3"/>
        <rect x="268" y="11" width="6" height="48" rx="3"/>
        <rect x="280" y="25" width="6" height="20" rx="3"/>
        <rect x="292" y="17" width="6" height="36" rx="3"/>
        <rect x="304" y="23" width="6" height="24" rx="3"/>
      </svg>
    </div>

    <div class="progress-wrap">
      <input id="progress" type="range" min="0" max="100" value="0" />
    </div>

    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
      <button id="shuffleBtn" class="icon-btn" aria-label="shuffle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M3 7H6C8 7 9.5 7.8 11 10L13 13C14.5 15.2 16 16 18 16H21" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 5L21 7.5L18 10" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 17H6C8 17 9.5 16.2 11 14L13 11C14.5 8.8 16 8 18 8H21" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 14L21 16.5L18 19" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <button id="prevBtn" class="icon-btn" aria-label="previous">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="5" width="2.5" height="14" rx="1"></rect>
          <path d="M18 5.5V18.5C18 19.3 17.1 19.77 16.44 19.29L8.02 13.23C7.46 12.82 7.46 11.98 8.02 11.57L16.44 5.71C17.1 5.23 18 5.7 18 6.5Z"></path>
        </svg>
      </button>

      <button id="playBtn" class="main-btn" aria-label="play">
        <svg id="playIcon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5.5V18.5C8 19.3 8.9 19.77 9.56 19.29L18.44 13.29C19 12.88 19 12.12 18.44 11.71L9.56 5.71C8.9 5.23 8 5.7 8 6.5Z"></path>
        </svg>
      </button>

      <button id="nextBtn" class="icon-btn" aria-label="next">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor">
          <rect x="17.5" y="5" width="2.5" height="14" rx="1"></rect>
          <path d="M6 5.5V18.5C6 19.3 6.9 19.77 7.56 19.29L15.98 13.23C16.54 12.82 16.54 11.98 15.98 11.57L7.56 5.71C6.9 5.23 6 5.7 6 6.5Z"></path>
        </svg>
      </button>

      <button id="repeatBtn" class="icon-btn" aria-label="repeat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M7 7H17C18.66 7 20 8.34 20 10V10" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
          <path d="M17 4L20 7L17 10" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M17 17H7C5.34 17 4 15.66 4 14V14" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"/>
          <path d="M7 14L4 17L7 20" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <audio id="audio"></audio>
    <div id="playlist" class="playlist"></div>
  </div>

  <script>
    const songs = [
      {
        title: "hey! hey!",
        artist: "TWS",
        file: "hey-hey.mp3",
        cover: "summerbeat.jpg"
      },
      {
        title: "Fire Confetti",
        artist: "TWS",
        file: "fire-confetti.mp3",
        cover: "summerbeat.jpg"
      },
      {
        title: "Lucky to be loved",
        artist: "TWS",
        file: "lucky-to-be-loved.mp3",
        cover: "trywithus.webp"
      }
    ];

    const audio = document.getElementById("audio");
    const cover = document.getElementById("cover");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const progress = document.getElementById("progress");
    const playBtn = document.getElementById("playBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const currentTimeEl = document.getElementById("currentTime");
    const durationEl = document.getElementById("duration");
    const playIcon = document.getElementById("playIcon");
    const likeBtn = document.getElementById("likeBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const repeatBtn = document.getElementById("repeatBtn");

    let current = 0;
    let isShuffle = false;
    let isRepeat = false;

    function formatTime(time) {
      if (isNaN(time)) return "0:00";
      const min = Math.floor(time / 60);
      const sec = Math.floor(time % 60).toString().padStart(2, "0");
      return `${min}:${sec}`;
    }

    function updatePlayIcon() {
      if (audio.paused) {
        playIcon.innerHTML = '<path d="M8 5.5V18.5C8 19.3 8.9 19.77 9.56 19.29L18.44 13.29C19 12.88 19 12.12 18.44 11.71L9.56 5.71C8.9 5.23 8 5.7 8 6.5Z"></path>';
      } else {
        playIcon.innerHTML = '<rect x="7" y="5" width="3.8" height="14" rx="1"></rect><rect x="13.2" y="5" width="3.8" height="14" rx="1"></rect>';
      }
    }

    function updateWaveColor() {
      const rects = document.querySelectorAll(".wave-svg rect");
      rects.forEach((rect) => {
        rect.style.fill = audio.paused ? "#a9d2ff" : "#2f6fff";
      });
    }

    function loadSong(index) {
      const song = songs[index];
      audio.src = song.file;
      cover.src = song.cover;
      title.textContent = song.title;
      artist.textContent = song.artist;
      progress.value = 0;
      currentTimeEl.textContent = "0:00";
      durationEl.textContent = "0:00";
      updatePlayIcon();
      updateWaveColor();
    }

    function playSong() {
      audio.play();
      updatePlayIcon();
      updateWaveColor();
    }

    function pauseSong() {
      audio.pause();
      updatePlayIcon();
      updateWaveColor();
    }

    function nextSong() {
      if (isShuffle) {
        let randomIndex = Math.floor(Math.random() * songs.length);
        while (randomIndex === current && songs.length > 1) {
          randomIndex = Math.floor(Math.random() * songs.length);
        }
        current = randomIndex;
      } else {
        current = (current + 1) % songs.length;
      }
      loadSong(current);
      playSong();
    }

    function prevSong() {
      current = (current - 1 + songs.length) % songs.length;
      loadSong(current);
      playSong();
    }

    playBtn.addEventListener("click", () => {
      if (audio.paused) {
        playSong();
      } else {
        pauseSong();
      }
    });

    prevBtn.addEventListener("click", prevSong);
    nextBtn.addEventListener("click", nextSong);

    shuffleBtn.addEventListener("click", () => {
      isShuffle = !isShuffle;
      shuffleBtn.style.color = isShuffle ? "#2f6fff" : "#a9d2ff";
    });

    repeatBtn.addEventListener("click", () => {
      isRepeat = !isRepeat;
      repeatBtn.style.color = isRepeat ? "#2f6fff" : "#a9d2ff";
    });

    likeBtn.addEventListener("click", () => {
      likeBtn.classList.toggle("active");
    });

    audio.addEventListener("loadedmetadata", () => {
      durationEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("timeupdate", () => {
      if (audio.duration) {
        progress.value = (audio.currentTime / audio.duration) * 100;
        currentTimeEl.textContent = formatTime(audio.currentTime);
      }
    });

    progress.addEventListener("input", () => {
      if (audio.duration) {
        audio.currentTime = (progress.value / 100) * audio.duration;
      }
    });

    audio.addEventListener("ended", () => {
      if (isRepeat) {
        audio.currentTime = 0;
        playSong();
      } else {
        nextSong();
      }
    });

    loadSong(current);
  </script>
</body>
</html>
