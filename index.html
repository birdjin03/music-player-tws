<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Player</title>

<style>
body {
  margin: 0;
  background: transparent;
}

/* 핵심: 전체 축소 */
.wrapper {
  transform: scale(0.2);   /* ← 여기 줄이면 더 작아짐 (0.5도 가능) */
  transform-origin: top left;
  width: 180px;
}

/* 실제 플레이어 */
.player {
  width: 180px;
  padding: 14px;
  background: white;
  border-radius: 20px;
  font-family: sans-serif;
}

/* 커버 */
.cover-box {
  width: 80%;
  aspect-ratio: 1/1;
  border: 2px solid #a9d2ff;
  border-radius: 16px;
  overflow: hidden;
}

.cover {
  width: 80%;
  height: 80%;
  object-fit: cover;
}

/* 텍스트 */
.title {
  font-size: 11px;
  font-weight: 700;
  margin-top: 8px;
}

.artist {
  font-size: 9px;
  color: #666;
}

/* 프로그레스 */
input[type="range"] {
  width: 100%;
  margin-top: 8px;
}

input[type="range"]::-webkit-slider-thumb {
  background: #2f6fff;
}

/* 버튼 */
.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

button {
  border: none;
  background: none;
  font-size: 16px;
  color: #a9d2ff;
}

button:hover {
  color: #2f6fff;
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="player">

    <div class="cover-box">
      <img id="cover" class="cover" src="summerbeat.jpg">
    </div>

    <div id="title" class="title">hey! hey!</div>
    <div id="artist" class="artist">TWS</div>

    <audio id="audio"></audio>

    <input id="progress" type="range" min="0" max="100" value="0">

    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
    </div>

  </div>
</div>

<script>
const songs = [
  {
    title: "hey! hey!",
    artist: "TWS",
    file: "hey-hey.mp3",
    cover: "summerbeat.jpg"
  },
  {
    title: "Fire Confetti",
    artist: "TWS",
    file: "fire-confetti.mp3",
    cover: "summerbeat.jpg"
  },
  {
    title: "Lucky to be loved",
    artist: "TWS",
    file: "lucky-to-be-loved.mp3",
    cover: "trywithus.webp"
  }
];

let current = 0;

const audio = document.getElementById("audio");
const cover = document.getElementById("cover");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const progress = document.getElementById("progress");

const playBtn = document.getElementById("play");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

function loadSong(i){
  audio.src = songs[i].file;
  cover.src = songs[i].cover;
  title.textContent = songs[i].title;
  artist.textContent = songs[i].artist;
}

function playPause(){
  if(audio.paused){
    audio.play();
    playBtn.textContent = "⏸";
  } else {
    audio.pause();
    playBtn.textContent = "▶";
  }
}

playBtn.onclick = playPause;

nextBtn.onclick = () => {
  current = (current + 1) % songs.length;
  loadSong(current);
  audio.play();
};

prevBtn.onclick = () => {
  current = (current - 1 + songs.length) % songs.length;
  loadSong(current);
  audio.play();
};

audio.ontimeupdate = () => {
  if(audio.duration){
    progress.value = (audio.currentTime / audio.duration) * 100;
  }
};

progress.oninput = () => {
  if(audio.duration){
    audio.currentTime = (progress.value / 100) * audio.duration;
  }
};

loadSong(current);
</script>

</body>
</html>
